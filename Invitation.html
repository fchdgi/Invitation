<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation Françoise & David</title>
    <style>
        body { margin: 0; padding: 0; background: linear-gradient(135deg, #8B4513, #A0522D); font-family: 'Georgia', serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; }
        #df1 { max-width: 90%; max-height: 70vh; cursor: pointer; transition: opacity 1s; }
        #df2 { max-width: 90%; max-height: 70vh; opacity: 0; transition: opacity 1s; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .texte { position: absolute; top: 10%; text-align: center; font-size: 1.5em; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); animation: fadeIn 2s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .seal { position: absolute; top: 64%; left: 50%; transform: translate(-50%, -50%); width: 26%; height: auto; cursor: pointer; transition: transform 0.3s; z-index: 10; } /* Ajustez top/width si besoin pour centrer sur sceau rouge */
        .seal:hover { transform: translate(-50%, -50%) scale(1.1); }
        .ouvert { opacity: 0 !important; }
    </style>
</head>
<body>
    <div class="texte">
        Vous avez une nouvelle notification de Françoise & David.<br>
        Cliquez sur le sceau rouge pour ouvrir l'invitation.
    </div>
    <img id="df1" src="DF-1.jpg" alt="Enveloppe invitation" onclick="ouvrir()">
    <img id="df2" src="DF-2.jpg" alt="Invitation ouverte">
    <audio id="melodie" src="boite-musique-mariage.mp3" preload="auto"></audio>
    <script>
        function ouvrir() {
            document.getElementById('df1').classList.add('ouvert');
            document.getElementById('df2').style.opacity = 1;
            document.getElementById('melodie').play();
            setTimeout(() => { window.location.href = 'https://fchdgi.github.io/wedding-website/'; }, 6000); // 6s pour musique + vue
        }
    </script>
</body>
</html>
