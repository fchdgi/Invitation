<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation Françoise & David - Full Screen</title>
    <link rel="preload" href="DF 1.png" as="image">
    <link rel="preload" href="DF 2.png" as="image">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Dancing+Script:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            height: 100vh; overflow: hidden; 
            background: linear-gradient(135deg, #f4e4bc 0%, #d9b38c 50%, #8B4513 100%); 
            font-family: 'Playfair Display', serif; color: #5D4037; position: relative; 
        }
        .image-full { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh; 
            object-fit: cover; transition: opacity 2s ease-in-out; z-index: 1; 
            will-change: opacity;
        }
        #df2 { opacity: 0; }
        .texte { 
            position: absolute; top: 15%; left: 50%; transform: translateX(-50%); 
            text-align: center; font-size: clamp(1.2em, 4vw, 2.2em); 
            font-family: 'Dancing Script', cursive; font-weight: 700;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.9), 0 0 10px rgba(255,182,193,0.6);
            z-index: 5; animation: fadeIn 2s ease-out; max-width: 90%;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        
        /* Save the Date CORRIGÉ RESPONSIVE */
        .save-date {
            position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 6; opacity: 0;
            font-family: 'Great Vibes', cursive;
            text-shadow: 2px 2px 6px rgba(255,255,255,0.9), 0 0 15px rgba(255,182,193,0.8);
            transition: opacity 1.5s ease-out; letter-spacing: 0.05em; line-height: 1.1;
        }
        .save-date.show { opacity: 1; }
        .save-date .date { 
            font-size: clamp(1.8em, 5vw, 3.2em); /* Réduit max PC: 3.2em~51px */
            color: #8B4513; margin-bottom: 0.1em; 
        }
        .save-date .day { 
            font-size: clamp(2.4em, 7vw, 4.5em); /* Réduit max PC: 4.5em~72px */
            font-weight: 700; color: #DAA520; margin-bottom: 1em; 
        }
        
        /* Media queries pour PC/tablette */
        @media (min-width: 768px) {
            .save-date .date { font-size: clamp(2em, 3vw, 3em); } /* Max 3em PC */
            .save-date .day { font-size: clamp(2.8em, 4vw, 4.2em); } /* Max 4.2em */
            .save-date { top: 48%; } /* Légèrement plus bas PC */
        }
        @media (min-width: 1200px) {
            .save-date .date { font-size: 2.8em; } /* Fixe raisonnable ultra-large */
            .save-date .day { font-size: 4em; }
        }
        
        /* Bouton */
        .btn-site {
            display: none; margin-top: 1.5em; padding: 0.8em 2em;
            background: linear-gradient(135deg, rgba(255,215,0,0.9), rgba(255,182,193,0.8));
            color: #5D4037; border: none; border-radius: 30px;
            font-family: 'Dancing Script', cursive; font-size: clamp(1.1em, 3vw, 1.6em); font-weight: 700;
            cursor: pointer; box-shadow: 0 8px 25px rgba(255,215,0,0.4), inset 0 2px 5px rgba(255,255,255,0.6);
            transition: all 0.3s ease; opacity: 0; transform: scale(0.9);
        }
        .btn-site.show { display: block; opacity: 1; transform: scale(1); animation: pulseBtn 2s infinite; }
        .btn-site:hover {
            transform: scale(1.05); box-shadow: 0 12px 35px rgba(255,182,193,0.6), inset 0 3px 8px rgba(255,255,255,0.8);
            background: linear-gradient(135deg, rgba(255,215,0,1), rgba(255,105,180,0.9));
        }
        @keyframes pulseBtn { 0%,100%{transform:scale(1);}50%{transform:scale(1.02);} }
        
        /* Pétales et sceau inchangés */
        .petal { 
            position: absolute; top: -10%; width: clamp(16px, 3vw, 24px); height: clamp(16px, 3vw, 24px); 
            background: radial-gradient(ellipse at 30% 30%, #ffb6c1, #ff69b4, #dda0dd);
            border-radius: 50% 0 70% 0; transform: rotate(45deg); z-index: 3;
            animation: fall linear infinite; opacity: 0.8; 
            will-change: transform, opacity; contain: layout style;
        }
        .petal:nth-child(1) { left: 10%; animation-duration: 8s; }
        .petal:nth-child(2) { left: 20%; animation-duration: 10s; animation-delay: 1s; }
        .petal:nth-child(3) { left: 30%; animation-duration: 7s; animation-delay: 2s; }
        .petal:nth-child(4) { left: 60%; animation-duration: 9s; animation-delay: 0.5s; }
        .petal:nth-child(5) { left: 80%; animation-duration: 11s; animation-delay: 3s; }
        @keyframes fall { 0% { transform: rotate(0deg) translateY(0); opacity: 0.8; } 100% { transform: rotate(720deg) translateY(110vh); opacity: 0; } }
        
        .seal { 
            position: fixed; top: 57vh; left: 58%; transform: translate(-50%, -50%);
            width: clamp(60px, 30vmin, 80px); height: clamp(60px, 30vmin, 80px); 
            background: transparent; border: none; outline: none; border-radius: 50%; cursor: pointer; z-index: 10;
            box-shadow: 0 0 15px rgba(255,215,0,0.5),0 0 25px rgba(255,182,193,0.4),0 0 35px rgba(255,105,180,0.3),inset 0 0 15px rgba(255,255,255,0.2);
            animation: sparkle 2.5s ease-in-out infinite; will-change: box-shadow;
        }
        @keyframes sparkle { /* inchangé, 3 phases */ 0%,100%{box-shadow:0 0 15px rgba(255,215,0,0.5),0 0 25px rgba(255,182,193,0.4),0 0 35px rgba(255,105,180,0.3),inset 0 0 15px rgba(255,255,255,0.2);transform:translate(-50%,-50%) scale(1);}33%{box-shadow:0 0 25px rgba(255,215,0,0.7),0 0 40px rgba(255,182,193,0.6),0 0 50px rgba(255,105,180,0.5),inset 0 0 25px rgba(255,255,255,0.4);transform:translate(-50%,-50%) scale(1.05);}66%{box-shadow:0 0 20px rgba(255,182,193,0.8),0 0 35px rgba(255,105,180,0.7),0 0 45px rgba(255,215,0,0.6),inset 0 0 20px rgba(255,255,255,0.3);transform:translate(-50%,-50%) scale(1.02);}}
        .seal:hover, .seal:focus { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 40px rgba(255,215,0,0.9),0 0 60px rgba(255,182,193,0.8),0 0 80px rgba(255,105,180,0.7),inset 0 0 30px rgba(255,255,255,0.6); animation: sparkle 1s ease-in-out infinite; }
    </style>
</head>
<body>
    <!-- HTML identique à précédent : df1,df2,pétales,texte,save-date avec btn-site,seal,audio,script ouvrir/goToSite -->
    <img id="df1" class="image-full" src="DF 1.png" alt="Enveloppe avec cœur or full screen" loading="eager">
    <img id="df2" class="image-full" src="DF 2.png" alt="Invitation full screen" loading="eager">
    
    <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
    
    <div class="texte">Ouvrez la boîte à musique<br><strong>Françoise & David</strong></div>
    
    <div class="save-date" id="saveDate">
        <div class="date">Save the date</div>
        <div class="day">23 Mai 2026</div>
        <button class="btn-site" id="btnSite" onclick="goToSite()" aria-label="Accéder au site du mariage">Accéder au site</button>
    </div>
    
    <div class="seal" onclick="ouvrir()" title="Cliquez le cœur pour ouvrir 💕" aria-label="Ouvrir l'invitation" role="button" tabindex="0"></div>
    
    <audio id="melodie" src="boite-musique-mariage.mp3" preload="metadata" crossorigin="anonymous" muted></audio>
    
    <script>
        // Script identique : ouvrir() avec timelines, goToSite(), events seal
        function ouvrir() {
            document.getElementById('df1').style.opacity = '0';
            document.querySelector('.texte').style.opacity = '0';
            document.querySelector('.seal').style.opacity = '0';
            document.querySelectorAll('.petal').forEach(p => p.style.opacity = '0');
            setTimeout(() => document.getElementById('df2').style.opacity = '1', 500);
            const melodie = document.getElementById('melodie'); melodie.volume=0.3; melodie.muted=false; melodie.play().catch(e=>console.log('Audio:',e));
            setTimeout(() => document.getElementById('saveDate').classList.add('show'), 2500);
            setTimeout(() => document.getElementById('btnSite').classList.add('show'), 3500);
            const maxWait=30000, timeout=setTimeout(goToSite,maxWait);
            melodie.onloadedmetadata=()=>{clearTimeout(timeout);setTimeout(goToSite,melodie.duration*1000);};
            melodie.onended=()=>{clearTimeout(timeout);goToSite();};
        }
        function goToSite(){window.location.href='https://fchdgi.github.io/wedding-website/';}
        document.querySelector('.seal').addEventListener('keydown',(e)=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();ouvrir();}});
        document.querySelector('.seal').addEventListener('touchstart',(e)=>{e.preventDefault();ouvrir();},{passive:false});
    </script>
</body>
</html>
