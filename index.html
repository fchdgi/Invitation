<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation Françoise & David - Full Screen</title>
    <link rel="preload" href="DF 1.png" as="image">
    <link rel="preload" href="DF 2.png" as="image">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Dancing+Script:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            height: 100vh; overflow: hidden; 
            background: linear-gradient(135deg, #f4e4bc 0%, #d9b38c 50%, #8B4513 100%); 
            font-family: 'Playfair Display', serif; color: #5D4037; position: relative; 
        }
        .image-full { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh; 
            object-fit: cover; transition: opacity 1.5s ease-in-out; z-index: 1; 
            will-change: opacity;
        }
        #df2 { opacity: 0; }
        .texte { 
            position: absolute; top: 15%; left: 50%; transform: translateX(-50%); 
            text-align: center; font-size: clamp(1.2em, 4vw, 2.2em); 
            font-family: 'Dancing Script', cursive; font-weight: 700;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.9), 0 0 10px rgba(255,182,193,0.6);
            z-index: 5; animation: fadeIn 2s ease-out; max-width: 90%;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        
        /* Pétales corrigés */
        .petal { 
            position: absolute; top: -10%; width: clamp(16px, 3vw, 24px); height: clamp(16px, 3vw, 24px); 
            background: radial-gradient(ellipse at 30% 30%, #ffb6c1, #ff69b4, #dda0dd);
            border-radius: 50% 0 70% 0; transform: rotate(45deg); z-index: 3;
            animation: fall linear infinite; opacity: 0.8; 
            will-change: transform, opacity; contain: layout style;
        }
        @keyframes fall {
            0% { transform: rotate(0deg) translateY(0); opacity: 0.8; }
            100% { transform: rotate(720deg) translateY(110vh); opacity: 0; }
        }
        .petal:nth-child(1) { left: 10%; animation-duration: 8s; }
        .petal:nth-child(2) { left: 20%; animation-duration: 10s; }
        .petal:nth-child(3) { left: 30%; animation-duration: 12s; }
        .petal:nth-child(4) { left: 40%; animation-duration: 9s; }
        .petal:nth-child(5) { left: 50%; animation-duration: 11s; }
        .petal:nth-child(6) { left: 60%; animation-duration: 13s; }
        .petal:nth-child(7) { left: 70%; animation-duration: 10s; }
        .petal:nth-child(8) { left: 80%; animation-duration: 12s; }
        .petal:nth-child(9) { left: 90%; animation-duration: 14s; }

        /* SCEAU TRANSPARENT SCINTILLANT */
        .seal { 
            position: fixed; top: 57vh; left: 58%; 
            transform: translate(-50%, -50%);
            width: clamp(60px, 30vmin, 80px); height: clamp(60px, 30vmin, 80px); 
            background: transparent; border: none; outline: none; cursor: pointer; z-index: 10;
            box-shadow: 
                0 0 15px rgba(255,215,0,0.5),
                0 0 25px rgba(255,182,193,0.4),
                0 0 35px rgba(255,105,180,0.3),
                inset 0 0 15px rgba(255,255,255,0.2);
            animation: sparkle 2.5s ease-in-out infinite;
            will-change: box-shadow;
        }
        @keyframes sparkle {
            0%, 100% { 
                box-shadow: 
                    0 0 15px rgba(255,215,0,0.5),
                    0 0 25px rgba(255,182,193,0.4),
                    0 0 35px rgba(255,105,180,0.3),
                    inset 0 0 15px rgba(255,255,255,0.2);
                transform: translate(-50%, -50%) scale(1);
            }
            33% {
                box-shadow: 
                    0 0 25px rgba(255,215,0,0.7),
                    0 0 40px rgba(255,182,193,0.6),
                    0 0 50px rgba(255,105,180,0.5),
                    inset 0 0 25px rgba(255,255,255,0.4);
                transform: translate(-50%, -50%) scale(1.05);
            }
            66% {
                box-shadow: 
                    0 0 20px rgba(255,182,193,0.8),
                    0 0 35px rgba(255,105,180,0.7),
                    0 0 45px rgba(255,215,0,0.6),
                    inset 0 0 20px rgba(255,255,255,0.3);
                transform: translate(-50%, -50%) scale(1.02);
            }
        }
        .seal:hover, .seal:focus { 
            transform: translate(-50%, -50%) scale(1.15); 
            box-shadow: 
                0 0 40px rgba(255,215,0,0.9),
                0 0 60px rgba(255,182,193,0.8),
                0 0 80px rgba(255,105,180,0.7),
                inset 0 0 30px rgba(255,255,255,0.6);
            animation-duration: 1s;
        }

        /* Transition */
        #transition { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh; 
            background: radial-gradient(circle, rgba(255,182,193,0.8) 0%, transparent 70%); 
            opacity: 0; z-index: 20; transition: opacity 0.5s; 
        }
        .hearts { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            font-size: clamp(4em, 15vw, 8em); animation: float 2s ease-in-out infinite; 
        }
        @keyframes float { 0%, 100% { transform: translate(-50%, -50%) translateY(0); } 50% { transform: translate(-50%, -50%) translateY(-20px); } }
        .btn-site { 
            position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%); 
            background: rgba(255,255,255,0.9); border: none; padding: 12px 24px; 
            font-family: 'Dancing Script', cursive; font-size: 1.5em; cursor: pointer; 
            border-radius: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); opacity: 0; 
            transition: opacity 0.5s; 
        }
        .btn-site.show { opacity: 1; }
    </style>
</head>
<body>
    <img id="df1" class="image-full" src="DF 1.png" alt="Invitation 1">
    <img id="df2" class="image-full" src="DF 2.png" alt="Invitation 2">
    
    <div class="texte">Françoise & David<br>Vous êtes invités ! 💕</div>
    
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    
    <div class="seal" onclick="ouvrir()" title="Cliquez le cœur pour ouvrir 💕" aria-label="Ouvrir l'invitation" role="button" tabindex="0"></div>
    <audio id="melodie" src="boite-musique-mariage.mp3" preload="metadata"></audio>
    
    <div id="transition">
        <div class="hearts">💕</div>
        <button class="btn-site" onclick="rediriger()">Accéder au site</button>
    </div>

    <script>
        function ouvrir() {
            document.getElementById('df1').style.opacity = '0';
            document.getElementById('df2').style.opacity = '1';
            
            const melodie = document.getElementById('melodie');
            melodie.volume = 0.3;
            melodie.muted = false;
            melodie.play().catch(e => console.log('Audio bloqué:', e));
            
            setTimeout(() => {
                document.getElementById('transition').style.opacity = '1';
                document.querySelector('.btn-site').classList.add('show');
            }, 500);
        }
        
        function rediriger() {
            document.body.style.opacity = '0';
            setTimeout(() => window.location.href = 'https://fchdgi.github.io/wedding-website/', 800);
        }
        
        // Auto-redirection après 20s sur DF2
        setTimeout(() => {
            if (document.getElementById('df2').style.opacity === '1') {
                rediriger();
            }
        }, 20000);
        
        // Accessibilité et mobile
        document.querySelector('.seal').addEventListener('keydown', (e) => { 
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); ouvrir(); }
        });
        document.querySelector('.seal').addEventListener('touchstart', (e) => {
            e.preventDefault(); ouvrir();
        }, { passive: false });
    </script>
</body>
</html>
