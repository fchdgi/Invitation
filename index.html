<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation Françoise & David - Full Screen</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Dancing+Script:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            height: 100vh; overflow: hidden; 
            background: linear-gradient(135deg, #f4e4bc 0%, #d9b38c 50%, #8B4513 100%); 
            font-family: 'Playfair Display', serif; color: #5D4037; position: relative; 
        }
        .image-full { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh; 
            object-fit: cover; /* ✅ FULL SCREEN partout ! */
            transition: opacity 1.5s ease-in-out; z-index: 1; 
        }
        #df2 { opacity: 0; }
        .texte { 
            position: absolute; top: 15%; left: 50%; transform: translateX(-50%); 
            text-align: center; font-size: clamp(1.2em, 4vw, 2.2em); 
            font-family: 'Dancing Script', cursive; font-weight: 700;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.9), 0 0 10px rgba(255,182,193,0.6);
            z-index: 5; animation: fadeIn 2s ease-out; max-width: 90%;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        
        /* Pétales flottants */
        .petal { 
            position: absolute; top: -10%; width: clamp(16px, 3vw, 24px); height: clamp(16px, 3vw, 24px); 
            background: radial-gradient(ellipse at 30% 30%, #ffb6c1, #ff69b4, #dda0dd);
            border-radius: 50% 0 70% 0; transform: rotate(45deg); z-index: 3;
            animation: fall linear infinite; opacity: 0.8;
        }
        .petal:nth-child(1) { left: 10%; animation-duration: 8s; }
        .petal:nth-child(2) { left: 20%; animation-duration: 10s; animation-delay: 1s; }
        .petal:nth-child(3) { left: 30%; animation-duration: 7s; animation-delay: 2s; }
        .petal:nth-child(4) { left: 60%; animation-duration: 9s; animation-delay: 0.5s; }
        .petal:nth-child(5) { left: 80%; animation-duration: 11s; animation-delay: 3s; }
        @keyframes fall { 0% { transform: rotate(0deg) translateY(0); opacity: 0.8; } 100% { transform: rotate(720deg) translateY(110vh); opacity: 0; } }
        
        /* Sceau wax full screen */
        .seal { 
            position: fixed; top: clamp(50vh, 57vh, 70vh); left: 53%; 
            transform: translate(-50%, -50%);
            width: clamp(6vmin, 6vmin, 6vmin); aspect-ratio: 1;
            background: linear-gradient(135deg, #DC143C, #B22222), url('sceau-df1.png') center/contain no-repeat;
            background-blend-mode: multiply; border: 3px solid rgba(255,255,255,0.95);
            border-radius: 50%; cursor: pointer; z-index: 10;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 8px 32px rgba(220,20,60,0.4), inset 0 0 24px rgba(255,255,255,0.3);
        }
        .seal:hover { 
            transform: translate(-50%, -50%) scale(1.12); 
            box-shadow: 0 12px 48px rgba(220,20,60,0.7), inset 0 0 32px rgba(255,255,255,0.5);
            animation: heartbeat 1s infinite;
        }
        @keyframes heartbeat { 0%,100%{transform:translate(-50%,-50%) scale(1);}50%{transform:translate(-50%,-50%) scale(1.1);} }
        
        /* Transition full screen */
        #transition { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh; 
            background: linear-gradient(135deg, #f4e4bc 0%, #d9b38c 50%, #8B7355 100%);
            display: none; justify-content: center; align-items: center; z-index: 100;
            opacity: 0; transition: opacity 0.6s ease-out;
        }
        #transition.show { display: flex; opacity: 1; }
        .loading-text {
            font-size: clamp(1.6em, 5.5vw, 3.2em); text-align: center; font-family: 'Great Vibes', cursive;
            color: #8B4513; text-shadow: 2px 2px 6px rgba(255,255,255,0.9);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:0.8;transform:scale(1);}50%{opacity:1;transform:scale(1.06);} }
        .hearts { 
            position: absolute; font-size: clamp(2.2em, 6.5vw, 3.5em); 
            animation: float 3s infinite; color: #ff69b4; 
        }
        .hearts:nth-child(1) { top: 15%; left: 20%; animation-delay: 0s; }
        .hearts:nth-child(3) { top: 15%; right: 20%; animation-delay: 0.8s; }
        @keyframes float { 0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-25px) rotate(15deg);} }
    </style>
</head>
<body>
    <img id="df1" class="image-full" src="DF 1.png" alt="Enveloppe full screen">
    <img id="df2" class="image-full" src="DF 2.png" alt="Invitation full screen">
    
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="petal"></div><div class="petal"></div>
    
    <div class="texte">
        Ouvrez la boîte à musique<br>
        <strong>Françoise & David</strong>
    </div>
    
    <div class="seal" onclick="ouvrir()" title="Cliquez pour ouvrir 💕" aria-label="Ouvrir l'invitation"></div>
    
    <audio id="melodie" src="boite-musique-mariage.mp3" preload="auto" loop="false"></audio>
    
    <div id="transition">
        <div class="hearts">💕</div>
        <div class="loading-text">Nous sommes honorés de vous convier à notre mariage</div>
        <div class="hearts">💕</div>
    </div>
    
    <script>
        function ouvrir() {
            document.getElementById('df1').style.opacity = '0';
            document.getElementById('df2').style.opacity = '1';
            document.querySelector('.texte').style.opacity = '0';
            document.querySelector('.seal').style.opacity = '0';
            document.querySelectorAll('.petal').forEach(p => p.style.opacity = '0');
            
            const melodie = document.getElementById('melodie');
            melodie.volume = 0.4;
            melodie.play().catch(e => console.log('Audio bloqué'));
            
            setTimeout(() => {
                document.body.style.opacity = '0';
                setTimeout(() => document.getElementById('transition').classList.add('show'), 1200);
            }, 3200);
            
            setTimeout(() => window.location.href = 'https://fchdgi.github.io/wedding-website/', 6800);
        }
    </script>
</body>
</html>
