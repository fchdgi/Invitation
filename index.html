<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation Françoise & David - Full Screen</title>
    <link rel="preload" href="DF 1.png" as="image">
    <link rel="preload" href="DF 2.png" as="image">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Dancing+Script:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            height: 100vh; overflow: hidden; 
            background: linear-gradient(135deg, #f4e4bc 0%, #d9b38c 50%, #8B4513 100%); 
            font-family: 'Playfair Display', serif; color: #5D4037; position: relative; 
        }
        .image-full { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh; 
            object-fit: cover; transition: opacity 2s ease-in-out; z-index: 1; 
            will-change: opacity;
        }
        #df2 { opacity: 0; }
        .texte { 
            position: absolute; top: 15%; left: 50%; transform: translateX(-50%); 
            text-align: center; font-size: clamp(1.2em, 4vw, 2.2em); 
            font-family: 'Dancing Script', cursive; font-weight: 700;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.9), 0 0 10px rgba(255,182,193,0.6);
            z-index: 5; animation: fadeIn 2s ease-out; max-width: 90%;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        
        /* Save the Date - OPTIMISÉ RESPONSIVE */
        .save-date {
            position: fixed; left: 50%; transform: translateX(-50%);
            text-align: center; z-index: 6; opacity: 0;
            font-family: 'Great Vibes', cursive;
            text-shadow: 2px 2px 6px rgba(255,255,255,0.9), 0 0 15px rgba(255,182,193,0.8);
            transition: opacity 1.5s ease-out; letter-spacing: 0.05em; line-height: 1.1;
        }
        .save-date.show { opacity: 1; }
        
        /* Mobile : haut écran, petites tailles */
        @media (max-width: 480px) {
            .save-date { 
                top: 25%; font-size: clamp(1.8em, 6vw, 2.5em); 
                max-width: 85vw;
            }
            .save-date .date { 
                font-size: clamp(1.2em, 4vw, 1.8em); color: #8B4513; margin-bottom: 0.2em; 
            }
            .save-date .day { 
                font-size: clamp(2em, 7vw, 3em); font-weight: 700; color: #DAA520; 
            }
            /* Position du sceau sur Mobile (à ajuster selon votre image) */
            .seal {
                top: 57vh;  
                left: 61%;  
            }
        }
        
        /* Tablette : milieu haut */
        @media (min-width: 481px) and (max-width: 768px) {
            .save-date { 
                top: 30%; font-size: clamp(2.2em, 5vw, 3em); 
            }
            .save-date .date { 
                font-size: clamp(1.8em, 3.5vw, 2.2em); color: #8B4513; margin-bottom: 0.1em; 
            }
            .save-date .day { 
                font-size: clamp(2.5em, 6vw, 3.8em); font-weight: 700; color: #DAA520; margin-bottom: 0.5em; 
            }
            /* Position du sceau sur Tablette (à ajuster selon votre image) */
            .seal {
                top: 57vh;
                left: 54%;
            }
        }
        
        /* Desktop : centre, grandes tailles */
        @media (min-width: 769px) {
            .save-date { top: 40%; }
            .save-date .date { 
                font-size: clamp(2.5em, 4vw, 4em); color: #8B4513; margin-bottom: 0.1em; 
            }
            .save-date .day { 
                font-size: clamp(3.5em, 6vw, 5.5em); font-weight: 700; color: #DAA520; margin-bottom: 1em; 
            }
            /* Position du sceau sur Ordinateur (vos réglages d'origine) */
            .seal {
                top: 57vh; 
                left: 53%; 
            }
        }
        
        @media (min-width: 1200px) {
            .save-date .date { font-size: 4.2em; }
            .save-date .day { font-size: 6em; }
        }
        
        /* Bouton BAS DROITE - Caché jusqu'au clic sur seal */
        .btn-site {
            position: fixed; bottom: 5vh; right: 5vw;
            padding: 0.7em 1.8em; min-width: 140px; display: none; /* Caché par défaut */
            background: linear-gradient(135deg, rgba(255,215,0,0.95), rgba(255,182,193,0.85));
            color: #5D4037; border: none; border-radius: 25px;
            font-family: 'Dancing Script', cursive; font-size: clamp(1em, 3.5vw, 1.4em); font-weight: 700;
            cursor: pointer; box-shadow: 0 6px 20px rgba(255,215,0,0.5), inset 0 2px 5px rgba(255,255,255,0.7);
            transition: all 0.3s ease; opacity: 0; transform: translateY(20px);
            z-index: 7;
        }
        .btn-site.show { 
            display: block !important; opacity: 1; transform: translateY(0); 
            animation: pulseBtn 2s infinite; 
        }
        .btn-site:hover {
            transform: translateY(-3px) scale(1.03); box-shadow: 0 10px 30px rgba(255,182,193,0.6), inset 0 3px 8px rgba(255,255,255,0.9);
            background: linear-gradient(135deg, rgba(255,215,0,1), rgba(255,105,180,0.95));
        }
        @keyframes pulseBtn { 0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-2px) scale(1.02);} }
        
        /* Pétales */
        .petal { 
            position: absolute; top: -10%; width: clamp(16px, 3vw, 24px); height: clamp(16px, 3vw, 24px); 
            background: radial-gradient(ellipse at 30% 30%, #ffb6c1, #ff69b4, #dda0dd);
            border-radius: 50% 0 70% 0; transform: rotate(45deg); z-index: 3;
            animation: fall linear infinite; opacity: 0.8; 
            will-change: transform, opacity; contain: layout style;
        }
        .petal:nth-child(1) { left: 10%; animation-duration: 8s; }
        .petal:nth-child(2) { left: 20%; animation-duration: 10s; animation-delay: 1s; }
        .petal:nth-child(3) { left: 30%; animation-duration: 7s; animation-delay: 2s; }
        .petal:nth-child(4) { left: 60%; animation-duration: 9s; animation-delay: 0.5s; }
        .petal:nth-child(5) { left: 80%; animation-duration: 11s; animation-delay: 3s; }
        @keyframes fall { 0% { transform: rotate(0deg) translateY(0); opacity: 0.8; } 100% { transform: rotate(720deg) translateY(110vh); opacity: 0; } }
        
        /* SCEAU DE BASE (Sans les positions top/left qui sont gérées dans les media queries) */
        .seal { 
            position: fixed; transform: translate(-50%, -50%);
            width: clamp(10px, 20vmin, 34px); height: clamp(20px, 30vmin, 34px); 
            background: transparent; border: none; outline: none; border-radius: 50%; cursor: pointer; z-index: 10;
            box-shadow: 0 0 15px rgba(255,215,0,0.5),0 0 25px rgba(255,182,193,0.4),0 0 35px rgba(255,105,180,0.3),inset 0 0 15px rgba(255,255,255,0.2);
            animation: sparkle 2.5s ease-in-out infinite; will-change: box-shadow;
        }
        @keyframes sparkle {
            0%,100%{box-shadow:0 0 15px rgba(255,215,0,0.5),0 0 25px rgba(255,182,193,0.4),0 0 35px rgba(255,105,180,0.3),inset 0 0 15px rgba(255,255,255,0.2);transform:translate(-50%,-50%) scale(1);}
            33%{box-shadow:0 0 25px rgba(255,215,0,0.7),0 0 40px rgba(255,182,193,0.6),0 0 50px rgba(255,105,180,0.5),inset 0 0 25px rgba(255,255,255,0.4);transform:translate(-50%,-50%) scale(1.05);}
            66%{box-shadow:0 0 20px rgba(255,182,193,0.8),0 0 35px rgba(255,105,180,0.7),0 0 45px rgba(255,215,0,0.6),inset 0 0 20px rgba(255,255,255,0.3);transform:translate(-50%,-50%) scale(1.02);}
        }
        .seal:hover, .seal:focus { 
            transform: translate(-50%, -50%) scale(1.15); 
            box-shadow: 0 0 40px rgba(255,215,0,0.9),0 0 60px rgba(255,182,193,0.8),0 0 80px rgba(255,105,180,0.7),inset 0 0 30px rgba(255,255,255,0.6);
            animation: sparkle 1s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <img id="df1" class="image-full" src="DF 1.png" alt="Enveloppe avec cœur or full screen" loading="eager">
    <img id="df2" class="image-full" src="DF 2.png" alt="Invitation full screen" loading="eager">
    
    <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
    
    <div class="texte">Ouvrez la boîte à musique<br><strong>Françoise & David</strong></div>
    
    <div class="save-date" id="saveDate">
        <div class="date">Save the date</div>
        <div class="day">23 Mai 2026</div>
    </div>
    
    <button class="btn-site" id="btnSite" onclick="goToSite()" aria-label="Accéder au site du mariage">Accéder au site</button>
    
    <div class="seal" onclick="ouvrir()" title="Cliquez le cœur pour ouvrir 💕" aria-label="Ouvrir l'invitation" role="button" tabindex="0"></div>
    
    <audio id="melodie" src="boite-musique-mariage.mp3" preload="metadata" crossorigin="anonymous"></audio>
    
    <script>
        function ouvrir() {
            // Interaction utilisateur détectée → audio activé
            document.getElementById('df1').style.opacity = '0';
            document.querySelector('.texte').style.opacity = '0';
            document.querySelector('.seal').style.opacity = '0';
            document.querySelectorAll('.petal').forEach(p => p.style.opacity = '0');
            
            setTimeout(() => document.getElementById('df2').style.opacity = '1', 500);
            
            // MUSIQUE : Fonctionne sur mobile après interaction
            const melodie = document.getElementById('melodie'); 
            melodie.volume = 0.3; 
            melodie.play().catch(e => console.log('Audio:', e));
            
            // Save the date après 2.5s
            setTimeout(() => document.getElementById('saveDate').classList.add('show'), 2500);
            
            // BOUTON : Apparaît UNIQUEMENT après clic sur seal (tous écrans)
            setTimeout(() => document.getElementById('btnSite').classList.add('show'), 3500);
            
            // Auto-redirect après musique
            const maxWait = 30000, timeout = setTimeout(goToSite, maxWait);
            melodie.onloadedmetadata = () => { clearTimeout(timeout); setTimeout(goToSite, melodie.duration * 1000); };
            melodie.onended = () => { clearTimeout(timeout); goToSite(); };
        }
        
        function goToSite() { window.location.href = 'https://fchdgi.github.io/wedding-website/'; }
        
        // Accessibilité clavier
        document.querySelector('.seal').addEventListener('keydown', (e) => { 
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); ouvrir(); } 
        });
        
        // Mobile touch optimisé
        document.querySelector('.seal').addEventListener('touchstart', (e) => {
            e.preventDefault(); ouvrir();
        }, { passive: false });
    </script>
</body>
</html>
